<main>
    <section class="contacto">
        <div class="contactoheader">
            <h2>Contacta con la empresa</h2>
            <p>Escribe tus dudas, sugerencias o pedidos y te responderemos cuanto antes.</p>
        </div>
        <form class="contactoform" action="#" method="post">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>

            <label for="asunto">Asunto</label>
            <input type="text" id="asunto" name="asunto" placeholder="¿Sobre qué quieres escribir?">

            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" name="mensaje" rows="6" placeholder="Escribe tu mensaje aquí..." required></textarea>

            <button type="submit">Enviar mensaje</button>
        </form>
    </section>
</main>
